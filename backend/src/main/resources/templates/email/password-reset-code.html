<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teenple 비밀번호 재설정</title>
</head>
<body style="margin:0;padding:0;background-color:#ECF6FF;font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#ECF6FF;padding:40px 24px;">
    <tr>
      <td align="left">
        <table width="480" cellpadding="0" cellspacing="0" style="width:100%;max-width:480px;background-color:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(29,161,242,0.10);">

          <!-- 헤더 -->
          <tr>
            <td style="background:linear-gradient(135deg,#1DA1F2 0%,#0d8bd9 100%);padding:32px 36px;">
              <p style="margin:0 0 2px;color:rgba(255,255,255,0.75);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;">Welcome to</p>
              <h1 style="margin:0;color:#ffffff;font-size:26px;font-weight:800;letter-spacing:-0.5px;">Teenple</h1>
              <p style="margin:6px 0 0;color:rgba(255,255,255,0.80);font-size:13px;">학생들을 위한 커뮤니티 플랫폼</p>
            </td>
          </tr>

          <!-- 본문 -->
          <tr>
            <td style="padding:36px 36px 28px;">
              <p style="margin:0 0 4px;color:#111111;font-size:18px;font-weight:700;">비밀번호 재설정 인증번호 안내</p>
              <p style="margin:0 0 28px;color:#6B7280;font-size:14px;line-height:1.7;">
                안녕하세요! Teenple입니다 😊<br>
                비밀번호 재설정을 위한 인증번호를 아래에서 확인해주세요.
              </p>

              <!-- 인증번호 박스 -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
                <tr>
                  <td style="background-color:#ECF6FF;border-radius:12px;padding:26px 24px;text-align:center;">
                    <p style="margin:0 0 8px;color:#6B7280;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;">인증번호</p>
                    <p th:text="${code}" style="margin:0;color:#1DA1F2;font-size:38px;font-weight:800;letter-spacing:12px;">000000</p>
                  </td>
                </tr>
              </table>

              <!-- 안내사항 -->
              <p style="margin:0 0 6px;color:#4B5563;font-size:13px;line-height:1.8;">
                ⏱ 인증번호는 <strong style="color:#111111;">3분간</strong> 유효합니다.
              </p>
              <p style="margin:0;color:#4B5563;font-size:13px;line-height:1.8;">
                🔒 본인이 요청하지 않은 경우 이 메일을 무시하고 비밀번호를 변경해주세요.
              </p>
            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td style="border-top:1px solid #E3E7EF;padding:20px 36px;">
              <p style="margin:0;color:#9AA3AF;font-size:12px;line-height:1.6;">
                ©Teenple. All rights reserved.<br>
                본 메일은 발신 전용입니다.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
