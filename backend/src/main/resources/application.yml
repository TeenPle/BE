#    bucket: local-bucket                 # 로컬에선 의미 거의 없음
#    student-card-dir: student-card
#    base-url: http://localhost:8080/uploads

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:keys/firebase-service-account.json}

neis:
  api:
    key: ${NEIS_API_KEY}
    base-url: https://open.neis.go.kr/hub

viewcount:
  mode: PESSIMISTIC

moderation:
  image:
    # Rekognition 카테고리별 차단 신뢰도 임계값 (0~100, 이 값 이상이면 차단)
    nudity-threshold: 50
    suggestive-threshold: 80
    violence-threshold: 70
    disturbing-threshold: 70
    drugs-threshold: 70
    hate-threshold: 70

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99

#  # S3 기반 파일 스토리지 설정 （배포후 이를 활성화）
file:
  storage:
    bucket: ${FILE_BUCKET:teenple-media}
    student-card-bucket: ${FILE_STUDENT_CARD_BUCKET:teenple-student-card}
    student-card-dir: ${FILE_STUDENT_CARD_DIR:student-card}
    chat-dir: ${FILE_CHAT_DIR:chat}
    post-dir: ${FILE_POST_DIR:post}
    base-url: ${FILE_BASE_URL:https://teenple-media.s3.ap-northeast-2.amazonaws.com}
    region: ${AWS_REGION:ap-northeast-2}

#배포후 접근키 비밀키 삽입
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
    region:
      static: ${AWS_REGION:ap-northeast-2}
