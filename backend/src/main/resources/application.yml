server:
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "baseline"

  datasource:
    url: ${DB_URL:jdbc:p6spy:mysql://localhost:3306/shu?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:com.p6spy.engine.spy.P6SpyDriver}

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    protocol: smtp
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: false
            trust: smtp.gmail.com

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB

  jackson:
    serialization:
      fail-on-empty-beans: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mail:
  from: ${MAIL_FROM:${MAIL_USERNAME:}}

debug: ${DEBUG:false}

logging:
  level:
    root: INFO
    org.springframework.boot.autoconfigure: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: warn
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.web: INFO
    com.shu.backend: DEBUG
    p6spy: INFO

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}          # 1시간 (ms)
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}    # 14일 (ms)

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000, https://your-app-domain.com}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

websocket:
  endpoint: ${WS_ENDPOINT:/ws/chat}
  allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

chat:
  realtime:
    redis-channel: ${CHAT_REALTIME_REDIS_CHANNEL:chat:realtime}
  image:
    moderation:
      min-confidence: ${CHAT_IMAGE_MODERATION_MIN_CONFIDENCE:50}

## 로컬 파일 저장용 설정 (배포 후 비활성화)
#file:
#  upload-dir:
#    student-card: uploads/student-card   # 실제 로컬 폴더 (프로젝트 기준)
#    chat: uploads/chat
#    post: uploads/post
