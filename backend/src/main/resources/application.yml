server:
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "baseline"

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    protocol: smtp
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: false
            trust: smtp.gmail.com

  servlet:
    multipart:
      enabled: true
      max-file-size: 105MB    # 동영상 최대 100 MB + 여유
      max-request-size: 315MB # 파일 최대 3개 기준

  jackson:
    serialization:
      fail-on-empty-beans: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

mail:
  from: ${MAIL_FROM}

debug: ${DEBUG:false}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}          # 1시간 (ms)
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}    # 14일 (ms)

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

websocket:
  endpoint: ${WS_ENDPOINT:/ws/chat}
  allowed-origins: ${WS_ALLOWED_ORIGINS}

chat:
  realtime:
    redis-channel: ${CHAT_REALTIME_REDIS_CHANNEL:chat:realtime}
  image:
    moderation:
      min-confidence: ${CHAT_IMAGE_MODERATION_MIN_CONFIDENCE:50}

## 로컬 파일 저장용 설정 (배포 후 비활성화)
#file:
#  upload-dir:
#    student-card: uploads/student-card   # 실제 로컬 폴더 (프로젝트 기준)
#    chat: uploads/chat
#    post: uploads/post
#  storage:
#    bucket: local-bucket                 # 로컬에선 의미 거의 없음
#    student-card-dir: student-card
#    base-url: http://localhost:8080/uploads

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH}

neis:
  api:
    key: ${NEIS_API_KEY:}
    base-url: https://open.neis.go.kr/hub
  school-sync:
    enabled: ${NEIS_SCHOOL_SYNC_ENABLED:false}
    run-on-startup: ${NEIS_SCHOOL_SYNC_RUN_ON_STARTUP:false}
    create-boards: ${NEIS_SCHOOL_SYNC_CREATE_BOARDS:true}
    page-size: ${NEIS_SCHOOL_SYNC_PAGE_SIZE:1000}
    max-pages: ${NEIS_SCHOOL_SYNC_MAX_PAGES:30}
    request-interval-millis: ${NEIS_SCHOOL_SYNC_REQUEST_INTERVAL_MILLIS:250}

viewcount:
  mode: PESSIMISTIC

moderation:
  image:
    # Rekognition 카테고리별 차단 신뢰도 임계값 (0~100, 이 값 이상이면 차단)
    nudity-threshold: 50
    suggestive-threshold: 80
    violence-threshold: 70
    disturbing-threshold: 70
    drugs-threshold: 70
    hate-threshold: 70

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99

#  # S3 기반 파일 스토리지 설정 （배포후 이를 활성화）
file:
  storage:
    bucket: ${FILE_BUCKET}
    student-card-bucket: ${FILE_STUDENT_CARD_BUCKET}
    student-card-dir: ${FILE_STUDENT_CARD_DIR}
    chat-dir: ${FILE_CHAT_DIR}
    post-dir: ${FILE_POST_DIR}
    base-url: ${FILE_BASE_URL}
    region: ${AWS_REGION}

#배포후 접근키 비밀키 삽입
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    region:
      static: ${AWS_REGION}
